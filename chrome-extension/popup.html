<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BH571 Quick Units</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
  <link rel="stylesheet" href="popup.css">
</head>
<body class="dark-mode">
  <div class="popup-container">
    <header class="popup-header">
      <div class="branding">
        <button id="back-btn" class="icon-btn hidden" title="Back to Tools">
          <span class="material-symbols-outlined">arrow_back</span>
        </button>
        <img src="logo.svg" alt="Logo" class="logo">
        <h1 id="header-title">BH571 quick units</h1>
      </div>
      <button id="logout-btn" class="icon-btn hidden" title="Logout">
        <span class="material-symbols-outlined">power_settings_new</span>
      </button>
    </header>

    <!-- Login State -->
    <div id="auth-view" class="view">
      <div class="auth-card">
        <h2>Welcome Back</h2>
        <p>Sign in to access your utilities</p>
        
        <div class="input-group">
          <span class="material-symbols-outlined">person</span>
          <input type="text" id="username" placeholder="Username">
        </div>
        <div class="input-group">
          <span class="material-symbols-outlined">lock</span>
          <input type="password" id="password" placeholder="Password">
        </div>
        
        <button id="login-btn" class="primary-btn">Sign In</button>
        <button id="register-toggle-btn" class="secondary-btn">Create New Account</button>
        <p class="footer-note">Use your BH571 account</p>
      </div>
    </div>

    <!-- Register State -->
    <div id="register-view" class="view hidden">
      <div class="auth-card">
        <h2>Join BH571</h2>
        <p>Create your private tool account</p>
        
        <div class="input-group">
          <span class="material-symbols-outlined">person</span>
          <input type="text" id="reg-username" placeholder="Username">
        </div>
        <div class="input-group">
          <span class="material-symbols-outlined">lock</span>
          <input type="password" id="reg-password" placeholder="Password">
        </div>
        <div class="input-group">
          <span class="material-symbols-outlined">verified_user</span>
          <input type="password" id="reg-confirm" placeholder="Confirm Password">
        </div>
        
        <button id="register-btn" class="primary-btn">Register</button>
        <button id="login-toggle-btn" class="secondary-btn">Back to Login</button>
      </div>
    </div>

    <!-- Tool List State -->
    <div id="tools-view" class="view hidden">
      <div class="search-bar">
        <span class="material-symbols-outlined">search</span>
        <input type="text" id="tool-search" placeholder="Search 30+ tools...">
      </div>
      
      <div id="tool-list" class="tool-list">
        <!-- Tools will be injected here -->
      </div>
    </div>

    <!-- Tool Runner State -->
    <div id="runner-view" class="view hidden">
      <div class="runner-toolbar">
        <button id="btn-copy-result" class="icon-btn" title="Copy Result">
          <span class="material-symbols-outlined">content_copy</span>
        </button>
        <button id="btn-show-history" class="icon-btn" title="Show History">
          <span class="material-symbols-outlined">history</span>
        </button>
      </div>
      <div id="history-panel" class="history-panel hidden">
        <div class="history-header">
          <span>Recent Results</span>
          <button id="btn-clear-history" class="icon-btn small"><span class="material-symbols-outlined">delete</span></button>
        </div>
        <div id="history-items" class="history-items"></div>
      </div>
      <div id="runner-content" class="runner-content">
        <!-- Tool UI will be injected here -->
      </div>
    </div>

    <div id="status-message" class="toast hidden"></div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
